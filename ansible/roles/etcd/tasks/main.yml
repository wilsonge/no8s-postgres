---
- name: Install etcd
  ansible.builtin.apt:
    name: etcd
    state: present

- name: Check if etcd EBS volume has a filesystem
  ansible.builtin.command: blkid /dev/xvdg
  register: etcd_blkid_result
  changed_when: false
  failed_when: false

- name: Format etcd EBS volume with ext4
  ansible.builtin.command: mkfs.ext4 /dev/xvdg
  when: etcd_blkid_result.rc != 0
  changed_when: true

- name: Create etcd data mount point
  ansible.builtin.file:
    path: /var/lib/etcd
    state: directory
    owner: etcd
    group: etcd
    mode: "0700"

- name: Mount etcd EBS volume
  ansible.posix.mount:
    path: /var/lib/etcd
    src: /dev/xvdg
    fstype: ext4
    opts: defaults,noatime
    state: mounted

- name: Ensure etcd data mount is owned by etcd
  ansible.builtin.file:
    path: /var/lib/etcd
    state: directory
    owner: etcd
    group: etcd
    mode: "0700"

- name: Check if etcd data directory already exists (idempotency guard)
  ansible.builtin.stat:
    path: /var/lib/etcd/member
  register: etcd_member_dir

- name: Configure etcd
  ansible.builtin.template:
    src: etcd.env.j2
    dest: /etc/default/etcd
    owner: root
    group: root
    mode: "0644"
  vars:
    # Use 'existing' if etcd has already bootstrapped; 'new' on first run.
    etcd_initial_cluster_state: "{{ 'existing' if etcd_member_dir.stat.exists else 'new' }}"
  notify: Restart etcd

- name: Enable and start etcd
  ansible.builtin.systemd:
    name: etcd
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for etcd to be healthy
  ansible.builtin.command:
    cmd: etcdctl endpoint health --endpoints=http://{{ ansible_host }}:2379
  environment:
    ETCDCTL_API: "3"
  register: etcd_health
  retries: 15
  delay: 5
  until: etcd_health.rc == 0
  changed_when: false

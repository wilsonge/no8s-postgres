---
- name: Add PostgreSQL APT signing key
  ansible.builtin.get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /etc/apt/trusted.gpg.d/postgresql.asc
    mode: "0644"

- name: Add PostgreSQL APT repository
  ansible.builtin.apt_repository:
    repo: "deb https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg
    update_cache: true

- name: Install PostgreSQL packages
  ansible.builtin.apt:
    name:
      - "postgresql-{{ postgres_version }}"
      - "postgresql-client-{{ postgres_version }}"
      - "postgresql-server-dev-{{ postgres_version }}"
    state: present

- name: Stop and disable the default PostgreSQL service (Patroni manages it)
  ansible.builtin.systemd:
    name: postgresql
    state: stopped
    enabled: false
  ignore_errors: true

- name: Check if EBS data volume has a filesystem
  ansible.builtin.command: blkid /dev/xvdf
  register: blkid_result
  changed_when: false
  failed_when: false

- name: Format EBS data volume with ext4
  ansible.builtin.command: mkfs.ext4 /dev/xvdf
  when: blkid_result.rc != 0
  changed_when: true

- name: Create PostgreSQL data mount point
  ansible.builtin.file:
    path: /var/lib/postgresql/data
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

- name: Mount EBS data volume
  ansible.posix.mount:
    path: /var/lib/postgresql/data
    src: /dev/xvdf
    fstype: ext4
    opts: defaults,noatime
    state: mounted

- name: Ensure data mount is owned by postgres
  ansible.builtin.file:
    path: /var/lib/postgresql/data
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

---
- name: Install Patroni with etcd3 driver
  ansible.builtin.pip:
    name:
      - "patroni[etcd3]"
      - python-etcd
    state: present
    executable: pip3

- name: Create Patroni configuration directory
  ansible.builtin.file:
    path: /etc/patroni
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"

- name: Create Patroni data directory
  ansible.builtin.file:
    path: /var/lib/postgresql/data/patroni
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

- name: Write Patroni configuration
  ansible.builtin.template:
    src: patroni.yml.j2
    dest: /etc/patroni/patroni.yml
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart Patroni

- name: Install Patroni systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/patroni.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Patroni HA PostgreSQL agent
      Documentation=https://patroni.readthedocs.io/
      After=network.target etcd.service
      Wants=etcd.service

      [Service]
      Type=simple
      User=postgres
      Group=postgres
      ExecStart=/usr/local/bin/patroni /etc/patroni/patroni.yml
      ExecReload=/bin/kill -HUP $MAINPID
      KillMode=process
      TimeoutSec=30
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  notify:
    - Reload systemd
    - Restart Patroni

- name: Enable and start Patroni
  ansible.builtin.systemd:
    name: patroni
    state: started
    enabled: true
    daemon_reload: true

- name: Ensure Ansible custom facts directory exists
  ansible.builtin.file:
    path: /etc/ansible/facts.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Patroni custom fact script
  ansible.builtin.copy:
    src: patroni_facts.py
    dest: /etc/ansible/facts.d/patroni.fact
    owner: root
    group: root
    mode: "0755"

- name: Refresh local facts
  ansible.builtin.setup:
    filter: ansible_local
